<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather Dashboard - Check current weather and 5-day forecast for any city worldwide">
    <meta name="author" content="K G ASHAN CHAMINDU">
    <title>Weather Dashboard | Real-time Weather & Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Background Animation -->
        <div class="bg-animation">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🌤️</span>
                <h1>Weather Dashboard</h1>
            </div>
            <p class="tagline">Real-time weather at your fingertips</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container glass-card">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        id="cityInput" 
                        class="search-input" 
                        placeholder="Enter city name..."
                        autocomplete="off"
                    >
                </div>
                <button id="searchBtn" class="search-btn">
                    Search
                </button>
            </div>
            <div class="quick-cities">
                <span class="quick-label">Popular:</span>
                <button class="quick-city" data-city="London">London</button>
                <button class="quick-city" data-city="New York">New York</button>
                <button class="quick-city" data-city="Tokyo">Tokyo</button>
                <button class="quick-city" data-city="Colombo">Colombo</button>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden">
            <span class="error-icon">⚠️</span>
            <p id="errorText">City not found. Please try again.</p>
        </div>

        <!-- Current Weather Section -->
        <section id="currentWeather" class="current-weather glass-card hidden">
            <div class="weather-main">
                <div class="weather-info">
                    <div class="location">
                        <span class="location-icon">📍</span>
                        <h2 id="cityName">--</h2>
            
                <div class="detail-item">
                    <span class="detail-icon">💧</span>
                    <div class="detail-info">
                        <span class="detail-value" id="humidity">--</span>
                        <span class="detail-label">Humidity</span>
                    </div>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">🌡️</span>
                    <div class="detail-info">
                        <span class="detail-value" id="feelsLike">--</span>
                        <span class="detail-label">Feels Like</span>
                    </div>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">👁️</span>
                    <div class="detail-info">
                        <span class="detail-value" id="visibility">--</span>
                        <span class="detail-label">Visibility</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast Section -->
        <section id="forecastSection" class="forecast-section hidden">
            <h3 class="section-title">
                <span class="title-icon">📅</span>
                5-Day Forecast
            </h3>
            <div id="forecastContainer" class="forecast-container">
                <!-- Forecast cards will be populated by JavaScript -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Developed by <strong>K G ASHAN CHAMINDU</strong> | ITBNM-2313-0009</p>
            <p class="footer-note">Advanced Git & DevOps Assignment</p>
        </footer>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
